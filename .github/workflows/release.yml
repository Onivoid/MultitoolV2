name: Release Windows Builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-channel:
    name: Resolve release channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      publish_updater: ${{ steps.meta.outputs.publish_updater }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
      release_name: ${{ steps.meta.outputs.release_name }}
      updater_note: ${{ steps.meta.outputs.updater_note }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect channel from tag
        id: meta
        run: node scripts/versioning/release-channel.mjs --tag "${{ github.ref_name }}" --github-output "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows Release
    needs: resolve-channel
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup .NET SDK and WiX
        run: |
          Write-Host "Installing .NET SDK and WiX..." -ForegroundColor Cyan
          dotnet tool install --global wix --version 5.0.2
          $dotnetTools = Join-Path $env:USERPROFILE ".dotnet\tools"
          echo "$dotnetTools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$dotnetTools;$env:PATH"
          wix --version
          Write-Host "WiX installed successfully" -ForegroundColor Green

      - name: Build Standard Release (GitHub Distribution)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $env:TAURI_ENV_DISTRIBUTION = "github"
          $env:TAURI_ENV_PORTABLE = $null
          .\scripts\build-release.ps1 standard

      - name: Build Portable Release
        run: |
          $env:TAURI_ENV_PORTABLE = "true"
          $env:TAURI_ENV_DISTRIBUTION = "github"
          .\scripts\build-release.ps1 portable

      - name: Verify Build Artifacts
        run: |
          if (-not (Test-Path "builds/portable/MultitoolV2-Portable.exe")) { exit 1 }
          if (-not (Test-Path "builds/installer/MultitoolV2-Installer.msi")) { exit 1 }
          if (-not (Test-Path "builds/installer/MultitoolV2-Installer.msi.sig")) {
            Write-Host "MultitoolV2-Installer.msi.sig manquant (createUpdaterArtifacts + TAURI_SIGNING_PRIVATE_KEY)" -ForegroundColor Red
            exit 1
          }
          if (-not (Test-Path "builds/checksums.txt")) { exit 1 }

      - name: Create Release Notes
        shell: bash
        env:
          UPDATER_NOTE: ${{ needs.resolve-channel.outputs.updater_note }}
        run: |
          TAG="${{ github.ref_name }}"
          COMMIT=$(git rev-list -n 1 "$TAG")
          BODY=$(git log -1 --format=%B "$COMMIT")
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            BODY="Release ${TAG}"
          fi
          CHECKSUMS=$(cat builds/checksums.txt)
          {
            echo "$BODY"
            echo ""
            echo "## Checksums SHA256"
            echo ""
            echo '```'
            echo "$CHECKSUMS"
            echo '```'
            echo ""
            echo "---"
            echo "Portable : \`MultitoolV2-Portable.exe\` — ${UPDATER_NOTE}"
          } > RELEASE_NOTES.md

      - name: Upload assets to draft release
        uses: softprops/action-gh-release@v2.5.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.resolve-channel.outputs.release_name }}
          body_path: RELEASE_NOTES.md
          files: |
            builds/portable/MultitoolV2-Portable.exe
            builds/installer/MultitoolV2-Installer.msi
            builds/installer/MultitoolV2-Installer.msi.sig
            builds/checksums.txt
          draft: true
          prerelease: ${{ needs.resolve-channel.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [resolve-channel, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # softprops avec draft:false crée parfois une 2e release vide (sans assets).
      # On finalise explicitement le brouillon qui contient les binaires.
      - name: Publish draft release
        uses: actions/github-script@v7
        env:
          TAG: ${{ github.ref_name }}
          RELEASE_NAME: ${{ needs.resolve-channel.outputs.release_name }}
          PRERELEASE: ${{ needs.resolve-channel.outputs.prerelease }}
          MAKE_LATEST: ${{ needs.resolve-channel.outputs.make_latest }}
        with:
          script: |
            const tag = process.env.TAG;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prerelease = process.env.PRERELEASE === "true";
            const makeLatest = process.env.MAKE_LATEST === "true";

            const { data: releases } = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100,
            });

            const draft = releases.find((r) => r.tag_name === tag && r.draft);
            if (!draft) {
              const published = releases.find((r) => r.tag_name === tag && !r.draft);
              if (published) {
                core.info(`Release ${tag} already published (id ${published.id}).`);
                return;
              }
              core.setFailed(`No draft release found for tag ${tag}. Upload step may have failed.`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: draft.id,
              name: process.env.RELEASE_NAME,
              draft: false,
              prerelease,
              make_latest: makeLatest,
            });

            core.info(`Published release ${tag} (id ${draft.id}) with ${draft.assets?.length ?? 0} assets from draft.`);

      - name: Generate and upload latest.json
        if: needs.resolve-channel.outputs.publish_updater == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/updater.mjs ${{ github.ref_name }}

      - name: Validate latest.json
        if: needs.resolve-channel.outputs.publish_updater == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/validate-latest-json.mjs ${{ github.ref_name }}

      - name: Verify prerelease did not become Latest
        if: needs.resolve-channel.outputs.publish_updater != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/versioning/verify-release-safety.mjs --tag "${{ github.ref_name }}"
