name: Check Version Consistency

on:
    pull_request:
        branches: [main, master]
    push:
        branches: [main, master]

jobs:
    check-version:
        name: Verify version files
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Check version consistency
              run: node scripts/check-version.js
